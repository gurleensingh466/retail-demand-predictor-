server:
  port: 8081

spring:
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:h2:mem:retaildb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2

app:
  upload:
    maxRowsPreview: 25
  sample:
    outputPath: sample_sales_data.xlsx

